        async function uploadOneByOne() {
            if(!confirm("서버 데이터를 삭제하고 190건을 하나씩 다시 올릴까요?")) return;
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            const log = document.getElementById('log');
            btn.disabled = true;

            try {
                // 1. 기존 데이터 삭제
                status.innerText = "서버 데이터 삭제 중...";
                const snap = await db.collection("oil_records").get();
                const batch = db.batch();
                snap.docs.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
                log.innerHTML += "✅ 삭제 완료<br>";

                // 2. 하나씩 전송
                for (let i = 0; i < allData.length; i++) {
                    await db.collection("oil_records").add({
                        ...allData[i],
                        regDate: Date.now()
                    });
                    status.innerText = `전송 중... (${i + 1} / 190)`;
                    log.innerHTML += `🚀 [${allData[i].date}] ${allData[i].amount}원 전송 완료<br>`;
                    log.scrollTop = log.scrollHeight;
                    
                    // 안정성을 위해 아주 짧은 휴식 (0.05초)
                    await new Promise(r => setTimeout(r, 50));
                }

                status.innerText = "🎉 190건 전송 최종 완료!";
                alert("성공적으로 복구되었습니다. 이제 최종 앱 코드로 교체하세요!");

            } catch (e) {
                status.innerText = "❌ 오류 발생";
                log.innerHTML += "에러: " + e.message;
            }
        }
    </script>
