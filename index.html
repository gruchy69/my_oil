    // 서버 데이터 표시 (기존 로직)
    function fetchRecords() {
        db.collection("oil_records").orderBy("date", "asc").onSnapshot((snapshot) => {
            let records = [];
            snapshot.forEach((doc) => records.push(doc.data()));
            
            const list = document.getElementById("recordList");
            list.innerHTML = "";
            let sumMoney = 0;
            let sumOil = 0;

            records.forEach(r => {
                sumMoney += r.amount;
                sumOil += r.capacity;
                const card = document.createElement("div");
                card.className = "record-card";
                card.innerHTML = `📅 ${r.date} | ⛽ ${r.unitPrice}원 | 💧 ${r.capacity}L | 💳 ${r.amount.toLocaleString()}원 | 🛣️ ${r.totalDist.toLocaleString()}km`;
                list.prepend(card);
            });
            
            const totalKm = records.length > 1 ? records[records.length-1].totalDist - records[0].totalDist : 0;
            document.getElementById('totalSpend').innerText = sumMoney.toLocaleString() + "원";
            document.getElementById('avgEconomy').innerText = sumOil > 0 ? (totalKm / sumOil).toFixed(2) : "0.00";
        });
    }
